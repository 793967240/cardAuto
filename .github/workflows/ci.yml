name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GODOT_VERSION: "4.3"
  GODOT_RELEASE: "stable"

jobs:
  # ──────────────────────────────────────────────────────────────
  # i18n 校验（最快，先跑）
  # ──────────────────────────────────────────────────────────────
  i18n_check:
    name: i18n Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check i18n keys and placeholders
        run: python3 tools/i18n_check.py
      - name: Check for hardcoded UI strings
        run: python3 tools/i18n_no_hardcode.py

  # ──────────────────────────────────────────────────────────────
  # 单元测试 + 集成测试（Headless Godot）
  # ──────────────────────────────────────────────────────────────
  unit_tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: i18n_check
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-linux

      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
          unzip -q "${GODOT_FILENAME}.zip"
          chmod +x "${GODOT_FILENAME}"
          mv "${GODOT_FILENAME}" /usr/local/bin/godot

      - name: Import project assets
        run: |
          godot --headless --import 2>&1 | tail -5 || true

      - name: Run unit tests
        run: |
          godot --headless --path . \
            --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/unit \
            -gprefix=test_ \
            -gexit \
            2>&1

      - name: Run integration tests
        run: |
          godot --headless --path . \
            --script addons/gut/gut_cmdln.gd \
            -gdir=res://tests/integration \
            -gprefix=test_ \
            -gexit \
            2>&1

  # ──────────────────────────────────────────────────────────────
  # PC 三平台构建烟雾测试（仅 main 分支）
  # ──────────────────────────────────────────────────────────────
  build_smoke:
    name: Build Smoke (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    needs: unit_tests
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: ubuntu-latest
            export_preset: "Windows Desktop"
            artifact_path: "build/windows/timechain.exe"
          - platform: linux
            runner: ubuntu-latest
            export_preset: "Linux/X11"
            artifact_path: "build/linux/timechain.x86_64"
          - platform: macos
            runner: macos-latest
            export_preset: "macOS"
            artifact_path: "build/macos/TimeChain.dmg"

    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}-${{ matrix.runner }}

      - name: Download Godot + Export Templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
            wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
            unzip -q "${GODOT_FILENAME}.zip"
            chmod +x "${GODOT_FILENAME}"
            sudo mv "${GODOT_FILENAME}" /usr/local/bin/godot
          else
            GODOT_FILENAME="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_macos.universal"
            wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${GODOT_FILENAME}.zip"
            unzip -q "${GODOT_FILENAME}.zip"
            sudo mv "Godot.app" /Applications/Godot.app
            sudo ln -s "/Applications/Godot.app/Contents/MacOS/Godot" /usr/local/bin/godot
          fi
          TEMPLATES="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TEMPLATES}"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          unzip -q "${TEMPLATES}" -d /tmp/templates
          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Create build directory
        run: mkdir -p build/${{ matrix.platform }}

      - name: Import project
        run: godot --headless --import 2>&1 | tail -5 || true

      - name: Export ${{ matrix.platform }}
        run: |
          godot --headless --path . \
            --export-release "${{ matrix.export_preset }}" \
            "${{ matrix.artifact_path }}" \
            2>&1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}
          path: build/${{ matrix.platform }}/
          retention-days: 7
